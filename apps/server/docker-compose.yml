version: '3.8'

services:
  # 后端 API 服务
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: youziyi-backend
    restart: always
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - DATABASE_URL=file:./dev.db
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    volumes:
      - ./prisma:/app/prisma
      - ./public/uploads:/app/public/uploads
    depends_on:
      - redis
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Redis 缓存服务（预警状态存储）
  redis:
    image: redis:7-alpine
    container_name: youziyi-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes

volumes:
  redis-data:
